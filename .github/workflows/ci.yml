name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          # Access gate is a spend shield only (NFR-8 / P0-6); CI runs the
          # build with the gate disabled so the route-collection step does
          # not require a configured passcode.
          ACCESS_PASSCODE: ""
          ACCESS_COOKIE_SECRET: ""

      - name: Test
        run: pnpm test

      - name: Guardrail eval (P4-3)
        # Runs the adversarial guardrail set; a leak or a missed refusal
        # fails the build. Same suite is already executed as part of
        # `pnpm test`, but a separate step makes the pass/fail signal
        # visible in CI logs (observability.md Component B: pass/fail).
        run: pnpm test:guardrails

      - name: Eval gate (P5-5)
        # Runs the offline eval against the mock adapter on the golden
        # set and compares to `eval-baseline.json`. A regression on the
        # headline metric (false-negative rate) or any other metric
        # outside the configured tolerance fails the build. The mock is
        # deterministic so the regression signal is meaningful in CI
        # (observability.md — The Improvement Cycle, Gate).
        run: pnpm eval --gate
        env:
          EVAL_PROVIDER: mock

      - name: Upload eval gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-gate-report
          path: eval-reports/
